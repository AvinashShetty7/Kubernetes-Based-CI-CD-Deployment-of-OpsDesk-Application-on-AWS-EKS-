apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketback-deployment
  labels:
    app: ticketback
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketback
  template:
    metadata:
      labels:
        app: ticketback
    spec:
      containers:
      - name: ticketback
        image: avi03/ticketbackend:{{ .Values.backend.image.tag }}
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: ticketback-config
              key: PORT
        - name: MONGODB
          valueFrom:
            configMapKeyRef:
              name: ticketback-config
              key: MONGODB
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: ticketback-config
              key: DB_NAME
        - name: JWT_SECRET
          valueFrom:
            configMapKeyRef:
              name: ticketback-config
              key: JWT_SECRET